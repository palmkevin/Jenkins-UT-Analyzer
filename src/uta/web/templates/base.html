<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}UT Analyzer{% endblock %}</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <script>
    // Applied before first paint (blocking <head> script) to avoid a flash of the wrong theme.
    // No saved choice yet -> follow the OS/browser preference (prefers-color-scheme).
    (function () {
      var saved = localStorage.getItem("uta-theme");
      var theme = saved || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-bs-theme", theme);
    })();
  </script>
  <style>
    /* Material-style surface tokens: page background vs. elevated content surface
       (cards / tables / headers), one level apart in both themes. Bootstrap's own
       .card/.table pick these up via --bs-card-bg/--bs-table-bg (both default to
       --bs-body-bg upstream); dark values are real Material dark-theme colours
       (#121212 base, not Bootstrap's stock #212529) so the toggle is more than a
       Bootstrap palette swap. */
    :root, [data-bs-theme="light"] {
      --bs-body-bg: #f5f6f8;
      --uta-surface: #fff;
    }
    [data-bs-theme="dark"] {
      --bs-body-bg: #121212;
      --bs-body-color: rgba(255, 255, 255, .87);
      --bs-secondary-color: rgba(255, 255, 255, .6);
      --bs-border-color: rgba(255, 255, 255, .12);
      --uta-surface: #1e1e1e;
    }
    table.table { background-color: var(--uta-surface); }
    thead { background-color: var(--bs-tertiary-bg); }
    pre { background-color: var(--bs-tertiary-bg); }

    /* Domain-specific accents layered on top of Bootstrap (loaded first, so these win). */
    main { margin: 1.6rem auto; }
    h1 { font-size: 1.5rem; }
    h2 { font-size: 1.15rem; margin-top: 1.6rem; }
    .meta { color: #6c757d; margin-bottom: 1rem; }
    .empty { color: #868e96; font-style: italic; }
    code { font-size: 0.85em; }

    /* Test-status colouring (applied to cells / inline spans by status name). */
    .FAILED, .REGRESSION, .FAILING { color: #b00020; font-weight: 600; }
    .PASSED, .FIXED { color: #137333; font-weight: 600; }
    .SKIPPED, .REMOVED { color: #868e96; }

    /* Badges: keep the single-class call sites working on top of Bootstrap's .badge base. */
    .badge { background: #e6eaf0; color: #333; font-weight: 600; vertical-align: middle; }
    .badge.removed { background: #fde2e2; color: #b00020; }
    .badge.flaky { background: #fff3cd; color: #8a6d00; }
    .badge.match { background: #d7f0db; color: #137333; }

    /* Collapsible sections (native <details>/<summary>) styled as cards. */
    .card { display: block; padding: 1rem 1.25rem; margin-bottom: 1rem; --bs-card-bg: var(--uta-surface); }
    details.episodes { margin-bottom: 1rem; }
    summary { font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    summary:hover { color: #000; }
    details.card > summary { margin: 0; }
    details.card[open] > summary { margin-bottom: 0.8rem; }
    details.episodes > summary { font-size: 1.15rem; margin: 1.6rem 0 0.8rem; }

    .count { font-weight: 700; }
    .more { color: #6c757d; font-size: 0.9rem; margin: 0.4rem 0 1rem; }

    /* Trend charts (issue #53): inline SVG, no JS/CDN — colours mirror the status classes above. */
    .timeline-chart { display: block; }
    .timeline-chart polyline.FAILED { stroke: #b00020; }
    .timeline-chart polyline.REGRESSION { stroke: #6f42c1; stroke-dasharray: 4 3; }
    .timeline-legend { color: #6c757d; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .timeline-legend .swatch { display: inline-block; width: 1.1rem; height: 0; border-top: 2px solid; vertical-align: middle; margin-right: 0.3rem; }
    .timeline-legend .swatch.FAILED { border-color: #b00020; }
    .timeline-legend .swatch.REGRESSION { border-color: #6f42c1; border-top-style: dashed; }

    .sparkline { vertical-align: middle; }
    .sparkline rect.FAILED { fill: #b00020; }
    .sparkline rect.PASSED { fill: #c9e4d4; }

    /* Theme toggle (issue #68): a Material-style icon button in the navbar. */
    .theme-toggle { width: 2.2rem; height: 2.2rem; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; }
    .theme-toggle svg { width: 1.2rem; height: 1.2rem; fill: currentColor; }
    [data-bs-theme="dark"] .theme-toggle .icon-sun,
    [data-bs-theme="light"] .theme-toggle .icon-moon { display: none; }

    /* Dark theme: re-tune the light-mode-only colours above (Bootstrap handles its own chrome,
       and the page/surface background comes from the --bs-body-bg / --uta-surface tokens above).
       Contrast re-checked against the real #121212/#1e1e1e surfaces: all pairs below are >= 5:1. */
    [data-bs-theme="dark"] .meta { color: #9aa1a9; }
    [data-bs-theme="dark"] .empty { color: #9aa1a9; }
    [data-bs-theme="dark"] .FAILED, [data-bs-theme="dark"] .REGRESSION, [data-bs-theme="dark"] .FAILING { color: #ff6b6b; }
    [data-bs-theme="dark"] .PASSED, [data-bs-theme="dark"] .FIXED { color: #4ade80; }
    [data-bs-theme="dark"] .SKIPPED, [data-bs-theme="dark"] .REMOVED { color: #9aa1a9; }
    [data-bs-theme="dark"] .badge { background: #2b2f36; color: #e9ecef; }
    [data-bs-theme="dark"] .badge.removed { background: #4a1f24; color: #ff6b6b; }
    [data-bs-theme="dark"] .badge.flaky { background: #4a3c0a; color: #ffd866; }
    [data-bs-theme="dark"] .badge.match { background: #16412a; color: #4ade80; }
    [data-bs-theme="dark"] summary:hover { color: #fff; }
    [data-bs-theme="dark"] .more { color: #9aa1a9; }
    [data-bs-theme="dark"] .timeline-chart polyline.FAILED { stroke: #ff6b6b; }
    [data-bs-theme="dark"] .timeline-chart polyline.REGRESSION { stroke: #b28cf5; }
    [data-bs-theme="dark"] .timeline-legend { color: #9aa1a9; }
    [data-bs-theme="dark"] .timeline-legend .swatch.FAILED { border-color: #ff6b6b; }
    [data-bs-theme="dark"] .timeline-legend .swatch.REGRESSION { border-color: #b28cf5; }
    [data-bs-theme="dark"] .sparkline rect.FAILED { fill: #ff6b6b; }
    [data-bs-theme="dark"] .sparkline rect.PASSED { fill: #285241; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">UT Analyzer</span>
    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link{% if nav_active == "triage" %} active" aria-current="page{% endif %}" href="/">Triage{% if triage_new_count %} <span class="badge rounded-pill text-bg-danger" title="{{ triage_new_count }} new failing test{{ "s" if triage_new_count != 1 }} awaiting acknowledgement">{{ triage_new_count }}</span>{% endif %}</a></li>
      <li class="nav-item"><a class="nav-link{% if nav_active == "runs" %} active" aria-current="page{% endif %}" href="/runs">Job runs</a></li>
      <li class="nav-item"><a class="nav-link{% if nav_active == "flaky" %} active" aria-current="page{% endif %}" href="/flaky">Flaky</a></li>
      <li class="nav-item"><a class="nav-link{% if nav_active == "kb" %} active" aria-current="page{% endif %}" href="/kb">Knowledge base</a></li>
      <li class="nav-item"><a class="nav-link{% if nav_active == "control" %} active" aria-current="page{% endif %}" href="/control">Control</a></li>
    </ul>
    <form class="d-flex align-items-center gap-2 me-2" method="get" action="/search">
      <input class="form-control form-control-sm" style="width: 12rem" type="text" name="q"
             placeholder="jump to test…" aria-label="search tests">
      <button class="btn btn-sm btn-outline-light" type="submit">Search</button>
    </form>
    <button type="button" id="theme-toggle" class="btn btn-outline-light theme-toggle me-2"
            title="Toggle dark/light theme" aria-label="Toggle dark/light theme">
      <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10Zm0-5a1 1 0 0 1 1 1v1.5a1 1 0 1 1-2 0V3a1 1 0 0 1 1-1Zm0 17.5a1 1 0 0 1 1 1V22a1 1 0 1 1-2 0v-1.5a1 1 0 0 1 1-1ZM3 11a1 1 0 1 0 0 2h1.5a1 1 0 1 0 0-2H3Zm17.5 0a1 1 0 1 0 0 2H22a1 1 0 1 0 0-2h-1.5ZM5.64 4.22a1 1 0 0 1 1.42 0l1.06 1.06a1 1 0 1 1-1.42 1.42L5.64 5.64a1 1 0 0 1 0-1.42Zm11.24 11.24a1 1 0 0 1 1.42 0l1.06 1.06a1 1 0 0 1-1.42 1.42l-1.06-1.06a1 1 0 0 1 0-1.42ZM18.36 4.22a1 1 0 0 1 0 1.42l-1.06 1.06a1 1 0 1 1-1.42-1.42l1.06-1.06a1 1 0 0 1 1.42 0ZM7.12 15.46a1 1 0 0 1 0 1.42l-1.06 1.06a1 1 0 1 1-1.42-1.42l1.06-1.06a1 1 0 0 1 1.42 0Z"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20.74 14.51a8.5 8.5 0 0 1-10.25-10.25 1 1 0 0 0-1.27-1.19A10.5 10.5 0 1 0 21.93 15.78a1 1 0 0 0-1.19-1.27Z"/>
      </svg>
    </button>
    {% if auth_enabled %}
    <span class="navbar-text small me-2">signed in as <strong>{{ actor }}</strong></span>
    <a class="btn btn-sm btn-outline-light" href="/logout">Logout</a>
    {% else %}
    <form class="d-flex align-items-center gap-2" method="post" action="/identity">
      <span class="navbar-text small">acting as</span>
      <input class="form-control form-control-sm" style="width: 10rem" type="text" name="actor"
             value="{{ actor }}" aria-label="acting user">
      <button class="btn btn-sm btn-outline-light" type="submit">set</button>
    </form>
    {% endif %}
  </nav>
  <main class="container-fluid px-4">
    {% block content %}{% endblock %}
  </main>
  <script>
    document.getElementById("theme-toggle").addEventListener("click", function () {
      var next = document.documentElement.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-bs-theme", next);
      localStorage.setItem("uta-theme", next);
    });
  </script>
</body>
</html>
