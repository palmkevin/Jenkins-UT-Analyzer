<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}UT Analyzer{% endblock %}</title>
  <link rel="stylesheet" href="/static/bootstrap.min.css">
  <style>
    /* Domain-specific accents layered on top of Bootstrap (loaded first, so these win). */
    body { background: #f5f6f8; }
    main { margin: 1.6rem auto; }
    h1 { font-size: 1.5rem; }
    h2 { font-size: 1.15rem; margin-top: 1.6rem; }
    .meta { color: #6c757d; margin-bottom: 1rem; }
    .empty { color: #868e96; font-style: italic; }
    code { font-size: 0.85em; }

    /* Test-status colouring (applied to cells / inline spans by status name). */
    .FAILED, .REGRESSION, .FAILING { color: #b00020; font-weight: 600; }
    .PASSED, .FIXED { color: #137333; font-weight: 600; }
    .SKIPPED, .REMOVED { color: #868e96; }

    /* Badges: keep the single-class call sites working on top of Bootstrap's .badge base. */
    .badge { background: #e6eaf0; color: #333; font-weight: 600; vertical-align: middle; }
    .badge.removed { background: #fde2e2; color: #b00020; }
    .badge.flaky { background: #fff3cd; color: #8a6d00; }

    /* Collapsible sections (native <details>/<summary>) styled as cards. */
    .card { display: block; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    details.episodes { margin-bottom: 1rem; }
    summary { font-size: 1.1rem; font-weight: 600; cursor: pointer; }
    summary:hover { color: #000; }
    details.card > summary { margin: 0; }
    details.card[open] > summary { margin-bottom: 0.8rem; }
    details.episodes > summary { font-size: 1.15rem; margin: 1.6rem 0 0.8rem; }

    .count { font-weight: 700; }
    .more { color: #6c757d; font-size: 0.9rem; margin: 0.4rem 0 1rem; }

    /* Trend charts (issue #53): inline SVG, no JS/CDN — colours mirror the status classes above. */
    .timeline-chart { display: block; }
    .timeline-chart polyline.FAILED { stroke: #b00020; }
    .timeline-chart polyline.REGRESSION { stroke: #6f42c1; stroke-dasharray: 4 3; }
    .timeline-legend { color: #6c757d; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .timeline-legend .swatch { display: inline-block; width: 1.1rem; height: 0; border-top: 2px solid; vertical-align: middle; margin-right: 0.3rem; }
    .timeline-legend .swatch.FAILED { border-color: #b00020; }
    .timeline-legend .swatch.REGRESSION { border-color: #6f42c1; border-top-style: dashed; }

    .sparkline { vertical-align: middle; }
    .sparkline rect.FAILED { fill: #b00020; }
    .sparkline rect.PASSED { fill: #c9e4d4; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand navbar-dark bg-dark px-3">
    <span class="navbar-brand fw-bold">UT Analyzer</span>
    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link" href="/">Triage</a></li>
      <li class="nav-item"><a class="nav-link" href="/runs">Job runs</a></li>
      <li class="nav-item"><a class="nav-link" href="/flaky">Flaky</a></li>
      <li class="nav-item"><a class="nav-link" href="/kb">Knowledge base</a></li>
      <li class="nav-item"><a class="nav-link" href="/control">Control</a></li>
    </ul>
    <form class="d-flex align-items-center gap-2" method="post" action="/identity">
      <span class="navbar-text small">acting as</span>
      <input class="form-control form-control-sm" style="width: 10rem" type="text" name="actor"
             value="{{ actor }}" aria-label="acting user">
      <button class="btn btn-sm btn-outline-light" type="submit">set</button>
    </form>
  </nav>
  <main class="container-fluid px-4">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
