<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}UT Analyzer{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; color: #1a1a1a; background: #fafafa; }
    header { display: flex; align-items: baseline; gap: 1.2rem; padding: 0.8rem 1.6rem;
             background: #1f2933; color: #fff; }
    header a { color: #cfe3ff; text-decoration: none; }
    header a:hover { text-decoration: underline; }
    header .brand { font-weight: 700; color: #fff; }
    header .spacer { flex: 1; }
    header form { display: inline; }
    header input { font-size: 0.8rem; padding: 0.15rem 0.3rem; }
    main { margin: 1.6rem; }
    h1 { font-size: 1.3rem; }
    h2 { font-size: 1.05rem; margin-top: 1.6rem; }
    .meta { color: #555; margin-bottom: 1rem; }
    table { border-collapse: collapse; width: 100%; font-size: 0.88rem; background: #fff; }
    th, td { text-align: left; padding: 0.35rem 0.6rem; border-bottom: 1px solid #eee; }
    th { background: #f0f2f5; }
    code { font-size: 0.82rem; color: #444; }
    .FAILED, .REGRESSION, .FAILING { color: #b00020; font-weight: 600; }
    .PASSED, .FIXED { color: #137333; }
    .SKIPPED, .REMOVED { color: #999; }
    .badge { display: inline-block; font-size: 0.72rem; padding: 0.05rem 0.4rem; border-radius: 3px;
             background: #e6eaf0; color: #333; }
    .badge.removed { background: #fde2e2; color: #b00020; }
    .badge.flaky { background: #fff3cd; color: #8a6d00; }
    .count { font-weight: 700; }
    .empty { color: #888; font-style: italic; }
    .more { color: #555; font-size: 0.85rem; margin: 0.4rem 0 1rem; }
    .more a { color: #1a5fb4; font-weight: 600; }
    button { font-size: 0.8rem; cursor: pointer; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 5px; padding: 0.8rem 1rem;
            margin-bottom: 1rem; }
    /* Collapsible sections (native <details>/<summary>). A <summary> reads like the old <h2>. */
    details { margin-bottom: 1rem; }
    summary { font-size: 1.05rem; font-weight: 600; cursor: pointer; }
    summary:hover { color: #000; }
    details.card > summary { margin: 0; }
    details.card[open] > summary { margin-bottom: 0.8rem; }
    details.episodes > summary { font-size: 1.05rem; margin: 1.6rem 0 0.8rem; }
    label { font-size: 0.82rem; color: #444; display: block; margin: 0.4rem 0 0.1rem; }
    input[type=text], textarea, select { width: 100%; max-width: 32rem; font-size: 0.85rem;
            padding: 0.25rem; box-sizing: border-box; }
  </style>
</head>
<body>
  <header>
    <span class="brand">UT Analyzer</span>
    <a href="/">Triage</a>
    <a href="/flaky">Flaky</a>
    <a href="/kb">Knowledge base</a>
    <span class="spacer"></span>
    <form method="post" action="/identity">
      <span>acting as</span>
      <input type="text" name="actor" value="{{ actor }}" aria-label="acting user">
      <button type="submit">set</button>
    </form>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
