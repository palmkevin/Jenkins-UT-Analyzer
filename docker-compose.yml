# Dev stack: web + poller (same image) + db, with a one-shot `migrate` that brings the schema to
# head before either app service starts. Postgres is "container now, external later": the app
# reaches it only via DATABASE_URL, so production points at an external server with no code change
# (disable the `db` service, set DATABASE_URL).
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-uta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uta}
      POSTGRES_DB: ${POSTGRES_DB:-uta}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-uta}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot schema migration. web/poller wait for this to *complete* so they never race each other
  # on `CREATE TABLE alembic_version` (the bug that crashed the poller on a cold start).
  migrate:
    build: .
    env_file: .env
    command: ["uta", "migrate"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    env_file: .env
    # Schema is applied by the `migrate` service; this just serves (no init-db, so no migrate race).
    # --proxy-headers/--forwarded-allow-ips: trust the ingress proxy's X-Forwarded-* so the OIDC
    # callback URL is built from the external https:// address (TLS terminates at the proxy).
    command:
      [
        "uvicorn", "uta.web.app:app",
        "--host", "0.0.0.0", "--port", "8000",
        "--proxy-headers", "--forwarded-allow-ips=*",
      ]
    ports:
      - "${WEB_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  poller:
    build: .
    env_file: .env
    # The scheduled poll + ingest loop (was a Slice-0 `sleep infinity` placeholder).
    command: ["uta", "poll"]
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
